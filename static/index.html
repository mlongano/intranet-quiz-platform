<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LAN Quiz</title>
<link rel="stylesheet" href="/static/style.css">
</head><body>
<h1>LAN Quiz</h1>

<section id="intro">
  <label>Name / ID: <input id="student-name"></label>
  <button id="start-btn">Start quiz</button>
</section>

<section id="quiz" hidden>
  <div id="q-count"></div>
  <p id="q-text"></p>
  <div id="options"></div>
  <textarea id="open-answer" rows="4" style="width:100%;display:none"></textarea>
  <button id="next-btn" disabled>Next</button>
</section>

<section id="finish" hidden>
  <h2>Thanks!</h2>
  <p>Your submission has been recorded.</p>
</section>

<section id="errors" hidden>
  <h2>Error</h2>
  <p>An error occurred while processing your request.</p>
</section>

<script src="/static/main.js"></script>
</body></html>
